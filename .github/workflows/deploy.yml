name: Deploy to cPanel Passenger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Passenger-Seat Bundle
        run: npx passenger-seat build

      - name: Deploy to cPanel via SFTP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 'tebitainnovations.com'
          username: 'erdfr'
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'passenger-seat-dist/*,!node_modules'
          target: 're'
          strip_components: 1

      - name: Restart Passenger
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 'tebitainnovations.com'
          username: 'erdfr'
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p re/tmp
            touch re/tmp/restart.txt
